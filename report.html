<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Match Report — Live Correspondent</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--teal:#4ecca3;--navy:#060d1a;--card:#0d1e35;--white:#f0f4f8;--grey:#8899aa;--danger:#ff4d6d;--gold:#f5c842;--border:rgba(78,204,163,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(78,204,163,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(78,204,163,0.025) 1px,transparent 1px);background-size:60px 60px;animation:gridDrift 25s linear infinite}
@keyframes gridDrift{100%{transform:translateY(60px)}}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(6,13,26,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(14px)}
.back-btn{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--grey);text-decoration:none;transition:color .2s}
.back-btn:hover{color:var(--teal)}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.topbar-actions{display:flex;gap:8px}
.action-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;border-radius:4px;border:none;cursor:pointer;transition:all .2s}
.btn-pdf{background:var(--teal);color:var(--navy);box-shadow:0 4px 16px rgba(78,204,163,.3)}
.btn-pdf:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(78,204,163,.45)}
.btn-share{background:rgba(255,255,255,.06);color:var(--white);border:1px solid var(--border)}
.btn-share:hover{background:rgba(78,204,163,.1);border-color:rgba(78,204,163,.4)}
.page{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:32px 16px 100px}
.report-doc{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;animation:fadeUp .6s ease-out forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.rpt-header,.rpt-match-info,.rpt-scoreline-block,.rpt-officials,.rpt-lineups,.rpt-timeline,.rpt-summary,.rpt-footer{padding:24px 28px;border-bottom:1px solid rgba(78,204,163,.08);text-align:center}
.rpt-footer{border-bottom:none}
.rpt-app-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:8px;color:var(--teal);margin-bottom:4px}
.rpt-doc-title{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--grey);text-transform:uppercase;margin-bottom:16px}
.rpt-rule{height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);margin:0 auto}
.rpt-info-competition{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--white);margin-bottom:4px}
.rpt-info-round{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--teal);margin-bottom:8px}
.rpt-info-line{font-size:14px;color:var(--grey);margin-bottom:4px;line-height:1.5}
.rpt-score-rule{height:1px;background:linear-gradient(90deg,transparent,rgba(78,204,163,.3),transparent);margin-bottom:16px}
.rpt-scoreline{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.rpt-score-team{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white);flex:1;min-width:80px}
.rpt-home-team{text-align:right}
.rpt-away-team{text-align:left}
.rpt-score-nums{display:flex;align-items:center;gap:8px;flex-shrink:0}
.rpt-score-digit{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--white);line-height:1}
.rpt-score-dash{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--grey)}
.rpt-section-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--teal);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:12px}
.rpt-section-title::before,.rpt-section-title::after{content:'';flex:1;height:1px;background:rgba(78,204,163,.2)}
.rpt-official-line{display:flex;justify-content:center;gap:16px;font-size:14px;margin-bottom:6px}
.rpt-off-label{color:var(--grey);font-weight:400}
.rpt-off-val{color:var(--white);font-weight:700}
.rpt-team-block{margin-bottom:8px}
.rpt-team-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:10px}
.rpt-home-col{color:var(--teal)}
.rpt-away-col{color:var(--gold)}
.rpt-player-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px}
.rpt-player-row:last-child{border-bottom:none}
.rpt-p-num{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--grey);width:28px;text-align:right}
.rpt-p-name{color:var(--white);font-weight:700;flex:1;text-align:left}
.rpt-p-pos{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--grey);width:32px;text-align:left}
.rpt-badge-c{font-size:10px;background:rgba(245,200,66,.2);color:var(--gold);border:1px solid rgba(245,200,66,.4);padding:1px 5px;border-radius:2px;vertical-align:middle;margin-left:4px}
.rpt-badge-gk{font-size:10px;background:rgba(78,204,163,.2);color:var(--teal);border:1px solid rgba(78,204,163,.4);padding:1px 5px;border-radius:2px;vertical-align:middle;margin-left:4px}
.rpt-divider-thin{height:1px;background:linear-gradient(90deg,transparent,rgba(136,153,170,.2),transparent);margin:12px 0}
.rpt-tl-headers{display:flex;align-items:center;margin-bottom:4px}
.rpt-tl-home-hdr{flex:1;text-align:right;padding-right:16px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--teal)}
.rpt-tl-away-hdr{flex:1;text-align:left;padding-left:16px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold)}
.rpt-tl-spine-hdr{width:2px;background:rgba(78,204,163,.2);align-self:stretch}
.rpt-tl-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(78,204,163,.3),transparent);margin-bottom:8px}
.rpt-tl-row{display:flex;align-items:stretch;min-height:32px;margin-bottom:2px}
.rpt-tl-home{flex:1;display:flex;justify-content:flex-end;padding-right:12px}
.rpt-tl-away{flex:1;display:flex;justify-content:flex-start;padding-left:12px}
.rpt-tl-spine{width:2px;background:rgba(78,204,163,.12);flex-shrink:0}
.rpt-tl-neutral{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;background:rgba(78,204,163,.04);border-top:1px solid rgba(78,204,163,.1);border-bottom:1px solid rgba(78,204,163,.1);margin:4px 0}
.rpt-tl-icon{font-size:14px}
.rpt-tl-neutral-text{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--teal);text-transform:uppercase}
.rpt-ev-cell{padding:8px 0;text-align:right;max-width:240px}
.rpt-tl-away .rpt-ev-cell{text-align:left}
.rpt-ev-top{display:flex;align-items:center;gap:4px;justify-content:flex-end;flex-wrap:wrap;margin-bottom:2px}
.rpt-tl-away .rpt-ev-top{justify-content:flex-start}
.rpt-ev-icon{font-size:13px}
.rpt-ev-time{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--teal)}
.rpt-ev-type{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--grey)}
.rpt-ev-player{font-size:13px;font-weight:700;color:var(--white)}
.rpt-ev-detail{font-size:11px;color:var(--grey);font-style:italic}
.rpt-summary-grid{max-width:280px;margin:0 auto}
.rpt-sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px}
.rpt-sum-row:last-child{border-bottom:none}
.rpt-sum-label{color:var(--grey)}
.rpt-sum-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--teal)}
.rpt-footer-rule{height:1px;background:linear-gradient(90deg,transparent,rgba(78,204,163,.3),transparent);margin-bottom:16px}
.rpt-footer-text{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--grey);letter-spacing:2px;margin-bottom:4px}
.rpt-footer-date{font-size:12px;color:rgba(136,153,170,.5);margin-bottom:4px}
.rpt-footer-copy{font-size:11px;color:rgba(136,153,170,.3);letter-spacing:1px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;gap:10px;padding:12px 16px;background:rgba(6,13,26,.97);border-top:1px solid var(--border);backdrop-filter:blur(16px)}
.btn-full{flex:1;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;border-radius:4px;border:none;cursor:pointer;transition:all .2s}
.btn-dl{background:var(--teal);color:var(--navy);box-shadow:0 6px 24px rgba(78,204,163,.3)}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(78,204,163,.5)}
.btn-sh{background:rgba(255,255,255,.05);color:var(--white);border:1px solid var(--border)}
.btn-sh:hover{background:rgba(78,204,163,.08);border-color:rgba(78,204,163,.3)}
@media print{body{background:#fff!important;color:#000!important}.bg-grid,.topbar,.bottom-bar{display:none!important}.page{padding:0!important;max-width:100%!important}.report-doc{background:#fff!important;border:none!important;border-radius:0!important}.rpt-app-name{color:#1a1a2e!important}.rpt-score-team,.rpt-score-digit,.rpt-ev-player,.rpt-p-name,.rpt-off-val{color:#000!important}.rpt-home-col,.rpt-tl-home-hdr{color:#1a6b50!important}.rpt-away-col,.rpt-tl-away-hdr{color:#8b6914!important}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<header class="topbar">
  <a href="home.html" class="back-btn">← HOME</a>
  <span class="topbar-title">MATCH REPORT</span>
  <div class="topbar-actions">
    <button class="action-btn btn-share" onclick="LC.report.share()">📤 Share</button>
    <button class="action-btn btn-pdf" onclick="LC.report.print()">📄 PDF</button>
  </div>
</header>
<div class="page">
  <div class="report-doc" id="reportContainer">
    <div style="text-align:center;padding:60px 20px;color:#8899aa;">
      <div style="font-size:32px;margin-bottom:12px;">⏳</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;">GENERATING REPORT...</div>
    </div>
  </div>
</div>
<div class="bottom-bar">
  <button class="btn-full btn-dl" onclick="LC.report.print()">📄 DOWNLOAD PDF</button>
  <button class="btn-full btn-sh" onclick="LC.report.share()">📤 SHARE</button>
</div>
<script src="report.js"></script>
<script>
document.querySelectorAll('a').forEach(link=>{link.addEventListener('click',e=>{const href=link.getAttribute('href');if(!href||href.startsWith('#'))return;e.preventDefault();document.body.style.transition='opacity 0.35s ease';document.body.style.opacity='0';setTimeout(()=>window.location.href=href,350)})});
window.addEventListener('DOMContentLoaded',()=>LC.report.init());
</script>
</body>
</html>
