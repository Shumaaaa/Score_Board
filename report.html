<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Report — Live Correspondent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            color: #fff; 
            font-family: Arial, sans-serif; 
            min-height: 100vh; 
            padding-bottom: 100px;
        }
        .header { 
            background: rgba(26,26,46,0.95); 
            padding: 20px 16px; 
            text-align: center; 
            border-bottom: 2px solid #4ecca3; 
        }
        .back-btn { 
            position: absolute; top: 50%; left: 16px; 
            transform: translateY(-50%); 
            background: none; border: none; color: #4ecca3; 
            font-size: 1.4rem; cursor: pointer; width: 48px; height: 48px; 
        }
        .report-container { 
            max-width: 800px; margin: 0 auto; padding: 40px 20px; 
        }
        .report-header { 
            text-align: center; margin-bottom: 40px; 
        }
        .logo { color: #4ecca3; font-size: 2.5rem; font-weight: bold; letter-spacing: 3px; margin-bottom: 10px; }
        .title { color: #fff; font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 30px; }
        .scoreline { 
            font-size: 3rem; font-weight: bold; color: #4ecca3; 
            text-align: center; margin: 40px 0; letter-spacing: 4px; 
        }
        .section { margin-bottom: 30px; }
        .section-title { 
            color: #4ecca3; font-size: 1.1rem; 
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; 
        }
        .match-info { text-align: center; line-height: 1.8; }
        .timeline { 
            display: flex; gap: 20px; margin-top: 20px; 
        }
        .timeline-col { flex: 1; }
        .event { 
            display: flex; align-items: center; gap: 8px; 
            margin-bottom: 8px; padding: 8px; 
            background: rgba(78,204,163,0.1); border-radius: 8px; 
        }
        .cta-container { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            padding: 20px 16px; background: linear-gradient(to top, #1a1a2e 70%, transparent); 
        }
        .cta-btn { 
            width: 100%; background: linear-gradient(135deg, #4ecca3, #3ab891); 
            color: #1a1a2e; border: none; border-radius: 16px; 
            padding: 20px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; box-shadow: 0 8px 25px rgba(78,204,163,0.3); 
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='home.html'">←</button>
        <h1>Match Report</h1>
    </div>

    <div class="report-container" id="reportContent">
        <!-- Report generated dynamically -->
    </div>

    <div class="cta-container">
        <button class="cta-btn" onclick="generatePDF()">📄 Download PDF</button>
        <button class="cta-btn" onclick="window.location.href='home.html'" style="margin-top: 12px; background: rgba(255,255,255,0.1);">← Back to Home</button>
    </div>

    <script>
        window.generateReport();  // From report.js
        
        function generatePDF() {
            window.print();  // Browser Print → Save as PDF
        }
    </script>
    <script src="report.js"></script>
</body>
</html>
