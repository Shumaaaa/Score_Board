<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pre-Match Setup — Live Correspondent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root {
    --teal:     #4ecca3;
    --teal-dim: #2a7a63;
    --navy:     #060d1a;
    --navy-mid: #0c1829;
    --navy-lit: #112238;
    --navy-card:#0d1e35;
    --white:    #f0f4f8;
    --grey:     #8899aa;
    --danger:   #ff4d6d;
    --gold:     #f5c842;
    --border:   rgba(78,204,163,0.15);
    --border-focus: rgba(78,204,163,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(78,204,163,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(78,204,163,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridDrift 25s linear infinite;
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(78,204,163,0.06) 0%, transparent 70%);
  }
  @keyframes gridDrift {
    0%   { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* ── CORNER BRACKETS ── */
  .corner { position: fixed; z-index: 5; pointer-events: none; width: 50px; height: 50px; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--teal); opacity: 0.3; }
  .corner::before { width: 2px; height: 100%; }
  .corner::after  { width: 100%; height: 2px; }
  .corner-tl { top: 16px; left: 16px; }
  .corner-tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner-br { bottom: 16px; right: 16px; transform: scale(-1); }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: rgba(6,13,26,0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(14px);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: var(--grey); text-decoration: none;
    transition: color 0.2s ease;
  }
  .back-btn:hover { color: var(--teal); }
  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px;
    color: var(--white);
  }
  .step-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--teal);
    border: 1px solid rgba(78,204,163,0.3);
    padding: 3px 10px; border-radius: 2px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    position: sticky; top: 57px; z-index: 19;
    background: rgba(6,13,26,0.85);
    padding: 0 24px 12px;
    backdrop-filter: blur(10px);
  }
  .progress-steps {
    display: flex; align-items: center; gap: 0;
    max-width: 640px; margin: 0 auto;
  }
  .progress-step {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 6px; position: relative;
  }
  .progress-step::after {
    content: '';
    position: absolute;
    top: 14px; left: 50%; right: -50%;
    height: 1px;
    background: rgba(78,204,163,0.15);
  }
  .progress-step:last-child::after { display: none; }
  .step-circle {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(78,204,163,0.2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--grey);
    background: var(--navy); position: relative; z-index: 1;
    transition: all 0.3s ease;
  }
  .progress-step.active .step-circle {
    border-color: var(--teal); color: var(--teal);
    box-shadow: 0 0 12px rgba(78,204,163,0.3);
  }
  .progress-step.done .step-circle {
    border-color: var(--teal); background: var(--teal); color: var(--navy);
  }
  .step-label {
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--grey); white-space: nowrap;
    transition: color 0.3s ease;
  }
  .progress-step.active .step-label { color: var(--teal); }
  .progress-step.done .step-label { color: rgba(78,204,163,0.6); }

  /* ── PAGE ── */
  .page {
    position: relative; z-index: 2;
    max-width: 640px; margin: 0 auto;
    padding: 32px 20px 120px;
  }

  /* ── SECTION BLOCKS ── */
  .form-section {
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease-out forwards;
  }
  .form-section:nth-child(1) { animation-delay: 0.1s; }
  .form-section:nth-child(2) { animation-delay: 0.2s; }
  .form-section:nth-child(3) { animation-delay: 0.3s; }
  .form-section:nth-child(4) { animation-delay: 0.4s; }

  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .section-icon { font-size: 20px; }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    color: var(--white);
  }
  .section-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: var(--teal); border: 1px solid rgba(78,204,163,0.25);
    padding: 2px 8px; border-radius: 2px;
    margin-left: auto;
  }
  .section-tag.optional { color: var(--grey); border-color: rgba(136,153,170,0.25); }

  .section-body {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  /* ── TEAM ROW — VS LAYOUT ── */
  .teams-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    align-items: center;
  }
  .team-half { padding: 20px; }
  .team-half:first-child { border-right: 1px solid rgba(78,204,163,0.08); }
  .vs-badge {
    padding: 0 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: var(--teal);
    letter-spacing: 2px;
    text-align: center;
  }

  /* ── FORM FIELDS ── */
  .field { padding: 16px 20px; border-bottom: 1px solid rgba(78,204,163,0.07); }
  .field:last-child { border-bottom: none; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .field-row .field { border-right: 1px solid rgba(78,204,163,0.07); }
  .field-row .field:last-child { border-right: none; }

  label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--grey); text-transform: uppercase;
    margin-bottom: 8px;
  }
  label .req { color: var(--teal); margin-left: 2px; }

  input[type="text"],
  input[type="date"],
  input[type="number"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(78,204,163,0.12);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    -webkit-appearance: none;
  }

  input[type="text"]:focus,
  input[type="date"]:focus,
  input[type="number"]:focus {
    border-color: var(--teal);
    background: rgba(78,204,163,0.05);
    box-shadow: 0 0 0 3px rgba(78,204,163,0.1);
  }

  input::placeholder { color: rgba(136,153,170,0.4); font-weight: 400; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) saturate(2) hue-rotate(120deg); }

  /* ── HOME / AWAY COLOUR TINT ── */
  .home-input:focus {
    border-color: var(--teal) !important;
    box-shadow: 0 0 0 3px rgba(78,204,163,0.12) !important;
  }
  .away-input:focus {
    border-color: var(--gold) !important;
    box-shadow: 0 0 0 3px rgba(245,200,66,0.12) !important;
  }

  /* ── OPTIONAL TOGGLE ── */
  .optional-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s ease;
  }
  .optional-toggle:hover { background: rgba(78,204,163,0.04); }
  .optional-toggle-label {
    font-size: 14px; font-weight: 600;
    color: var(--grey); letter-spacing: 0.5px;
  }
  .toggle-icon {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--teal);
    transition: transform 0.3s ease;
  }
  .toggle-icon.open { transform: rotate(180deg); }

  .optional-content {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease;
  }
  .optional-content.open { max-height: 1000px; }

  /* ── BOTTOM ACTIONS ── */
  .bottom-actions {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    padding: 16px 20px;
    background: rgba(6,13,26,0.96);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px);
    display: flex; gap: 12px; align-items: center;
    max-width: 100%;
  }

  .btn-proceed {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 18px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 3px;
    color: var(--navy);
    background: var(--teal);
    border: none; border-radius: 4px;
    cursor: pointer; text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    box-shadow: 0 8px 32px rgba(78,204,163,0.35);
    position: relative; overflow: hidden;
  }
  .btn-proceed::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s ease;
  }
  .btn-proceed:hover::before { left: 100%; }
  .btn-proceed:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 44px rgba(78,204,163,0.5);
  }
  .btn-proceed.disabled {
    opacity: 0.4; cursor: not-allowed; transform: none !important;
    box-shadow: none !important;
  }

  .btn-back {
    padding: 18px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    color: var(--grey);
    background: transparent;
    border: 1px solid rgba(136,153,170,0.2);
    border-radius: 4px;
    cursor: pointer; text-decoration: none;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .btn-back:hover { color: var(--white); border-color: rgba(136,153,170,0.5); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px);
    z-index: 99;
    background: var(--danger); color: #fff;
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600;
    padding: 12px 20px; border-radius: 4px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .teams-row { grid-template-columns: 1fr; }
    .team-half:first-child { border-right: none; border-bottom: 1px solid rgba(78,204,163,0.08); }
    .vs-badge { padding: 12px; }
    .field-row { grid-template-columns: 1fr; }
    .field-row .field { border-right: none; }
  }
</style>
</head>

<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-left">
    <a href="home.html" class="back-btn">← BACK</a>
    <span class="topbar-title">PRE-MATCH SETUP</span>
  </div>
  <div class="step-badge">STEP 1 / 3</div>
</header>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-steps">
    <div class="progress-step active">
      <div class="step-circle">1</div>
      <span class="step-label">Setup</span>
    </div>
    <div class="progress-step">
      <div class="step-circle">2</div>
      <span class="step-label">Squads</span>
    </div>
    <div class="progress-step">
      <div class="step-circle">3</div>
      <span class="step-label">Match</span>
    </div>
  </div>
</div>

<!-- Page -->
<div class="page">

  <!-- TEAMS -->
  <div class="form-section">
    <div class="section-header">
      <span class="section-icon">⚽</span>
      <span class="section-title">THE TEAMS</span>
      <span class="section-tag">REQUIRED</span>
    </div>
    <div class="section-body">
      <div class="teams-row">
        <div class="team-half">
          <label>Home Team <span class="req">*</span></label>
          <input class="home-input" type="text" id="homeTeam" placeholder="e.g. Yanga SC" maxlength="40" autocomplete="off">
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-half">
          <label>Away Team <span class="req">*</span></label>
          <input class="away-input" type="text" id="awayTeam" placeholder="e.g. Simba SC" maxlength="40" autocomplete="off">
        </div>
      </div>
      <div class="field">
        <label>Match Date <span class="req">*</span></label>
        <input type="date" id="matchDate">
      </div>
    </div>
  </div>

  <!-- COMPETITION -->
  <div class="form-section">
    <div class="section-header">
      <span class="section-icon">🏆</span>
      <span class="section-title">COMPETITION</span>
      <span class="section-tag optional">OPTIONAL</span>
    </div>
    <div class="section-body">
      <div class="field-row">
        <div class="field">
          <label>Competition</label>
          <input type="text" id="competition" placeholder="e.g. Premier League" maxlength="60" autocomplete="off">
        </div>
        <div class="field">
          <label>Round / Matchday</label>
          <input type="text" id="round" placeholder="e.g. Matchday 12" maxlength="40" autocomplete="off">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Venue</label>
          <input type="text" id="venue" placeholder="e.g. National Stadium" maxlength="60" autocomplete="off">
        </div>
        <div class="field">
          <label>Attendance</label>
          <input type="number" id="attendance" placeholder="e.g. 45000" min="0">
        </div>
      </div>
    </div>
  </div>

  <!-- OFFICIALS -->
  <div class="form-section">
    <div class="section-header">
      <span class="section-icon">🧑‍⚖️</span>
      <span class="section-title">MATCH OFFICIALS</span>
      <span class="section-tag optional">OPTIONAL</span>
    </div>
    <div class="section-body">
      <div class="field">
        <label>Referee</label>
        <input type="text" id="referee" placeholder="Full name" maxlength="60" autocomplete="off">
      </div>
      <div class="field">
        <label>Assistant Referee 1</label>
        <input type="text" id="assistant1" placeholder="Full name" maxlength="60" autocomplete="off">
      </div>
      <div class="field">
        <label>Assistant Referee 2</label>
        <input type="text" id="assistant2" placeholder="Full name" maxlength="60" autocomplete="off">
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Bottom Actions -->
<div class="bottom-actions">
  <a href="home.html" class="btn-back">← HOME</a>
  <button class="btn-proceed" id="proceedBtn" onclick="proceed()">
    SQUAD REGISTRATION →
  </button>
</div>

<script>
  // ── SET TODAY AS DEFAULT DATE ──
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('matchDate').value = today;

  // ── LOAD SETTINGS DEFAULTS ──
  const settings = JSON.parse(localStorage.getItem('lcSettings')) || {};
  if (settings.defaultCompetition) document.getElementById('competition').value = settings.defaultCompetition;
  if (settings.defaultVenue)       document.getElementById('venue').value = settings.defaultVenue;
  if (settings.defaultReferee)     document.getElementById('referee').value = settings.defaultReferee;

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── LIVE VALIDATION ──
  ['homeTeam','awayTeam','matchDate'].forEach(id => {
    document.getElementById(id).addEventListener('input', checkReady);
  });

  function checkReady() {
    const h = document.getElementById('homeTeam').value.trim();
    const a = document.getElementById('awayTeam').value.trim();
    const d = document.getElementById('matchDate').value;
    const btn = document.getElementById('proceedBtn');
    if (h && a && d) {
      btn.classList.remove('disabled');
    } else {
      btn.classList.add('disabled');
    }
  }
  checkReady();

  // ── PROCEED ──
  function proceed() {
    const home = document.getElementById('homeTeam').value.trim();
    const away = document.getElementById('awayTeam').value.trim();
    const date = document.getElementById('matchDate').value;

    if (!home || !away || !date) {
      showToast('Please fill in all required fields');
      return;
    }
    if (home.toLowerCase() === away.toLowerCase()) {
      showToast('Home and Away teams must be different');
      return;
    }

    const matchMeta = {
      home, away, date,
      competition: document.getElementById('competition').value.trim(),
      round:       document.getElementById('round').value.trim(),
      venue:       document.getElementById('venue').value.trim(),
      attendance:  document.getElementById('attendance').value.trim(),
      referee:     document.getElementById('referee').value.trim(),
      assistant1:  document.getElementById('assistant1').value.trim(),
      assistant2:  document.getElementById('assistant2').value.trim(),
    };

    localStorage.setItem('lcCurrentMeta', JSON.stringify(matchMeta));

    // Navigate
    document.body.style.transition = 'opacity 0.35s ease';
    document.body.style.opacity = '0';
    setTimeout(() => window.location.href = 'squads.html', 350);
  }

  // ── SMOOTH BACK NAVIGATION ──
  document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', e => {
      const href = link.getAttribute('href');
      if (!href || href.startsWith('#')) return;
      e.preventDefault();
      document.body.style.transition = 'opacity 0.35s ease';
      document.body.style.opacity = '0';
      setTimeout(() => window.location.href = href, 350);
    });
  });
</script>

</body>
</html>
