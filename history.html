<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History — Live Correspondent</title>
    <style> /* Same styles as other pages */ </style>
</head>
<body>
    <div class="header">
        <h1>Match History</h1>
    </div>
    <div id="historyList"></div>
    <script>
        const matches = JSON.parse(localStorage.getItem('liveCorrespondentMatches') || '[]');
        document.getElementById('historyList').innerHTML = matches.map(m => `
            <div class="match-card">
                <div>${m.meta.homeTeam} ${m.homeScore} - ${m.awayScore} ${m.meta.awayTeam}</div>
                <div>${new Date(m.timestamp).toLocaleDateString()}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
